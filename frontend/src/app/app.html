<router-outlet />

@if (errorService.showErrorModal()) {
  <div
    class="modal show d-block"
    tabindex="-1"
    style="background: rgba(0, 0, 0, 0.5); z-index: 9999"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-bottom-0">
          <h5 class="modal-title text-danger fw-bold">
            <i class="bi bi-x-circle-fill me-2"></i> İşlem Başarısız
          </h5>
          <button type="button" class="btn-close" (click)="errorService.closeError()"></button>
        </div>
        <div class="modal-body pt-0">
          <p class="mb-0 text-secondary fw-medium">
            {{ errorService.errorMessage() }}
          </p>
        </div>
        <div class="modal-footer border-top-0">
          <button type="button" class="btn btn-secondary px-4" (click)="errorService.closeError()">
            Tamam
          </button>
        </div>
      </div>
    </div>
  </div>
}
