<nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4 text-danger d-lg-none" routerLink="/events">Aksigorta</a>

    <button
      class="navbar-toggler border-0"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Menüyü aç"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <div
        class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between w-100 gap-3"
      >
        <div class="d-flex align-items-center">
          <a
            class="navbar-brand fw-bold fs-3 text-danger d-none d-lg-inline-block mb-0"
            routerLink="/events"
          >
            Aksigorta
          </a>
        </div>

        <form class="flex-grow-1 mx-lg-5" role="search" (ngSubmit)="onSearch()">
          <div class="position-relative">
            <input
              class="form-control form-control-lg rounded-pill ps-4 pe-5 bg-light border-0"
              type="search"
              placeholder="Yeni etkinlikler keşfet..."
              aria-label="Etkinlik ara"
              name="searchQuery"
              [(ngModel)]="searchQuery"
            />
            <button
              type="submit"
              class="btn position-absolute top-50 end-0 translate-middle-y me-2 text-muted border-0 bg-transparent"
            >
              <i class="bi bi-search fs-5"></i>
            </button>
          </div>
        </form>

        <div class="d-flex flex-column flex-lg-row align-items-center gap-4">
          <a
            class="btn btn-primary px-4 rounded-pill w-100 w-lg-auto fw-medium"
            routerLink="/events/create"
          >
            <i class="bi bi-plus-lg me-2"></i> Yeni Etkinlik
          </a>

          <div class="nav-item dropdown">
            <a
              class="nav-link dropdown-toggle d-flex align-items-center gap-2 fw-medium text-dark"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <i class="bi bi-person-circle text-secondary" style="font-size: 2rem"></i>
              <span>{{ globalName }}</span>
            </a>

            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-3">
              <li>
                <a class="dropdown-item py-2" routerLink="/my-events">
                  <i class="bi bi-calendar2-event me-2 text-muted"></i> Etkinliklerim
                </a>
              </li>
              <li>
                <a class="dropdown-item py-2" routerLink="/joined-events">
                  <i class="bi bi-calendar-check me-2 text-muted"></i> Katıldıklarım
                </a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item text-danger py-2" role="button" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i> Çıkış Yap
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

@if (showLogoutModal) {
  <div class="modal show d-block" tabindex="-1" style="background: rgba(0, 0, 0, 0.5)">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-bottom-0 pb-0">
          <h5 class="modal-title fw-bold">Çıkış Yap</h5>
          <button
            type="button"
            class="btn-close"
            (click)="closeLogoutModal()"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body py-4">
          <p class="mb-0 text-secondary">
            Aksigorta etkinliklerinden çıkış yapmak istediğinize emin misiniz?
          </p>

          @if (showLogoutError) {
            <p class="text-danger mt-2 mb-0">
              <i class="bi bi-exclamation-circle me-1"></i> Çıkış işlemi başarısız oldu. Lütfen
              tekrar deneyin.
            </p>
          }
        </div>
        <div class="modal-footer border-top-0 pt-0">
          <button type="button" class="btn btn-light" (click)="closeLogoutModal()">Vazgeç</button>
          <button type="button" class="btn btn-danger px-4" (click)="confirmLogout()">
            Evet, Çıkış Yap
          </button>
        </div>
      </div>
    </div>
  </div>
}
